        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
                background-color: #f5f5f5;
                margin: 0;
                padding: 20px;
            }
            h1 {
                text-align: center;
                margin-bottom: 30px;
            }
            .container {
                display: flex;
                justify-content: center;
                gap: 20px;
                flex-wrap: wrap;
            }
            .card {
                position: relative; /* penting untuk badge */
                background-color: white;
                width: 220px;
                padding: 15px;
                border-radius: 10px;
                text-align: center;
                box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15); /* Diperbaiki: koma di akhir dihapus */
            }
            .badge {
                position: absolute;
                top: 10px;
                right: 10px;
                background-color: red;
                color: white;
                padding: 5px 10px;
                font-size: 12px;
                border-radius: 5px;
            }
            .card img { /* Diperbaiki: 'image' diubah menjadi 'img' */
                width: 100%;
                border-radius: 8px;
            }
            .card h3 {
                margin: 10px 0px;
            }
            .price {
                color: green;
                font-weight: bold;
            }
            .card a {
                display: inline-block;
                margin-top: 10px;
                padding: 10px 15px;
                background-color: #1976d2;
                color: white;
                text-decoration: none;
                border-radius: 5px;
            }
            .card a:hover {
                background-color: #0d47a1;
            }
        </style>
    </head>
